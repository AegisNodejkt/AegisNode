name: AI Review
on:
  pull_request: # Wajib ada agar PR_NUMBER tersedia
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run My AI Reviewer
        uses: AegisNodejkt/Aegis-Wilwatikta@v1
        with:
          # Sesuaikan dengan nama di action.yml (huruf kecil)
          neo4j_uri: ${{ secrets.NEO4J_URI }}
          neo4j_user: ${{ secrets.NEO4J_USER }}
          neo4j_pass: ${{ secrets.NEO4J_PASS }}
          neo4j_database: ${{ secrets.NEO4J_DATABASE }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }} # Perbaikan typo
          provider: ${{ secrets.PROVIDER }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
